<!DOCTYPE html>
<html lang="{{ site.lang | default: 'ko' }}" data-theme="light">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: page.summary | default: site.description | escape }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&family=Newsreader:opsz,wght@6..72,500;6..72,650&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
    {% seo title=false %}
  </head>
  <body>
    <header class="site-header">
      <a class="site-logo" href="{{ '/' | relative_url }}">
        <span class="site-logo__badge">F</span>
        <span class="site-logo__copy">
          <strong>FutureKey Team Docs</strong>
          <span>Encrypted GitHub Pages portal</span>
        </span>
      </a>

      <div class="site-header__actions">
        <a class="ghost-link" href="{{ site.repository_url }}">Repository</a>
        <button
          class="theme-toggle"
          type="button"
          data-theme-toggle
          aria-label="Toggle dark mode"
          aria-pressed="false"
        >
          <span data-theme-label>Dark mode</span>
        </button>
      </div>
    </header>

    <div class="site-shell">
      <aside class="site-sidebar">
        {% include site_sidebar.html %}
      </aside>

      <main class="site-main">
        {{ content }}
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js" defer></script>
    <script src="{{ '/assets/js/site.js' | relative_url }}" defer></script>
  </body>
</html>
